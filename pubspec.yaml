name: study_assistant_app
description: "AI-powered study assistant app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 网络
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 图片/相机
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Markdown + LaTeX 渲染
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2

  # 工具
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0

  markdown: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
