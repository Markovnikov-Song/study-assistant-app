name: study_assistant_app
description: "伴学 - AI 学习助手"
publish_to: 'none'
version: 1.2.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Image/Camera
  flutter_svg: ^2.0.10
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Markdown + LaTeX Rendering
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2

  # Mindmap WebView Rendering
  webview_flutter: ^4.10.0
  screenshot: ^3.0.0
  gal: ^2.3.0

  # UUID Generation
  uuid: ^4.5.1

  # ZIP Extraction (for XMind import)
  archive: ^3.6.1

  # XML Parsing (for XMind / FreeMind import)
  xml: ^6.5.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: any

  markdown: any

  # Rich Text Editor
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0

  # Share and File Path
  share_plus: ^10.0.0
  path_provider: ^2.1.4

  # File Saver
  file_saver: ^0.2.12

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2

  # Network Status Monitoring
  connectivity_plus: ^6.1.1

  # Celebration Animation
  confetti: ^0.7.0
  vector_math: ^2.2.0
  web: ^1.1.1

  # Calendar
  table_calendar: ^3.2.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0

  # Speech Recognition
  speech_to_text: ^7.0.0

  # In-App Update
  package_info_plus: ^8.0.0
  open_file: ^3.3.2
  permission_handler: ^11.3.1
  
  # Background Download
  flutter_downloader: ^1.11.10
  
  # Keep App Awake During Tasks
  wakelock_plus: ^1.2.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  # App Assets
  assets:
    - assets/images/backgrounds/
    - assets/images/empty_states/
    - assets/images/icons/

  fonts:
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
    
    # Splash Screen Fonts
    - family: LXGWWenKai
      fonts:
        - asset: assets/fonts/LXGWWenKai-Regular.ttf
        - asset: assets/fonts/LXGWWenKai-Medium.ttf
          weight: 500
    - family: YanshiYouran
      fonts:
        - asset: assets/fonts/YanshiYouran-Regular.ttf
    - family: ZhiMangXing
      fonts:
        - asset: assets/fonts/ZhiMangXing-Regular.ttf
