name: study_assistant_app
description: "AI-powered study assistant app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 网络
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 图片/相机
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Markdown + LaTeX 渲染
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2

  # 思维导图 WebView 渲染
  webview_flutter: ^4.10.0
  screenshot: ^3.0.0
  gal: ^2.3.0

  # UUID 生成
  uuid: ^4.5.1

  # ZIP 解压（用于 XMind 导入）
  archive: ^3.6.1

  # XML 解析（用于 XMind / FreeMind 导入）
  xml: ^6.5.0

  # 工具
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: any

  markdown: any

  # 富文本编辑器
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0

  # 分享与文件路径
  share_plus: ^10.0.0
  path_provider: ^2.1.4

  # 文件保存
  file_saver: ^0.2.12

  # PDF 生成
  pdf: ^3.11.1
  printing: ^5.13.2

  # 网络状态监听
  connectivity_plus: ^6.1.1

  # 庆祝动画
  confetti: ^0.7.0
  vector_math: ^2.2.0
  web: ^1.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  # 应用资源
  assets:
    - assets/images/backgrounds/
    - assets/images/empty_states/
    - assets/images/icons/

  fonts:
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
