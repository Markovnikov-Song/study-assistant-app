      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#default_profile_bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#default_profile_glow1)"/>
  <rect width="1024" height="1024" fill="url(#default_profile_glow2)"/>
  <rect width="1024" height="1024" fill="url(#default_profile_glow3)"/>
  <!-- 娴姩鐞冧綋 -->
  <ellipse cx="200" cy="200" rx="100" ry="100" fill="url(#default_profile_orb1)"/>
  <ellipse cx="800" cy="180" rx="80" ry="80" fill="url(#default_profile_orb2)"/>
  <ellipse cx="650" cy="760" rx="120" ry="120" fill="url(#default_profile_orb1)"/>
