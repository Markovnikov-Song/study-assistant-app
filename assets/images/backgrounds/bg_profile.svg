<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 涓昏儗鏅笎鍙?- 鐝犲厜娣辫摑 -->
    <linearGradient id="default_profile_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#1e2347"/>
      <stop offset="100%" stop-color="#161830"/>
    </linearGradient>
    <!-- 鍏夋檿 -->
    <radialGradient id="default_profile_glow1" cx="25%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="default_profile_glow2" cx="78%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="default_profile_glow3" cx="60%" cy="80%" r="38%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- 娴悆娓愬彉 -->
    <radialGradient id="default_profile_orb1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.08"/>
