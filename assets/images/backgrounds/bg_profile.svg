<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主背景渐变 - 珠光深蓝 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#1e2347"/>
      <stop offset="100%" stop-color="#161830"/>
    </linearGradient>
    <!-- 光晕 -->
    <radialGradient id="glow1" cx="25%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="60%" cy="80%" r="38%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- 浮球渐变 -->
    <radialGradient id="orb1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.08"/>
    </radialGradient>
    <radialGradient id="orb2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.06"/>
    </radialGradient>
    <radialGradient id="orb3" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f3e8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#glow1)"/>
  <rect width="1024" height="1024" fill="url(#glow2)"/>
  <rect width="1024" height="1024" fill="url(#glow3)"/>
  <!-- 浮动球体 -->
  <ellipse cx="200" cy="200" rx="100" ry="100" fill="url(#orb1)"/>
  <ellipse cx="800" cy="180" rx="80" ry="80" fill="url(#orb2)"/>
  <ellipse cx="650" cy="760" rx="120" ry="120" fill="url(#orb1)"/>
  <ellipse cx="180" cy="730" rx="65" ry="65" fill="url(#orb3)"/>
  <ellipse cx="460" cy="460" rx="48" ry="48" fill="url(#orb2)"/>
  <ellipse cx="560" cy="200" rx="58" ry="58" fill="url(#orb3)"/>
  <!-- 星光点 -->
  <circle cx="330" cy="340" r="2" fill="#e0e7ff" opacity="0.55"/>
  <circle cx="710" cy="430" r="2.5" fill="#f3e8ff" opacity="0.5"/>
  <circle cx="450" cy="680" r="2" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="130" cy="490" r="1.5" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="890" cy="580" r="2" fill="#f3e8ff" opacity="0.45"/>
  <circle cx="590" cy="100" r="2" fill="#e0e7ff" opacity="0.55"/>
  <circle cx="270" cy="840" r="1.5" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="780" cy="920" r="2" fill="#f3e8ff" opacity="0.35"/>
</svg>
