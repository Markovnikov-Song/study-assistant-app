<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 涓昏儗鏅笎鍙?- 闈掔豢绉戞妧鎰?-->
    <linearGradient id="default_toolkit_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="50%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
    <!-- 鍏夋檿 -->
    <radialGradient id="default_toolkit_glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="default_toolkit_glow2" cx="80%" cy="25%" r="42%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
