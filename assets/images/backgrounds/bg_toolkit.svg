  <circle cx="350" cy="320" r="2" fill="#67e8f9" opacity="0.55"/>
  <circle cx="750" cy="420" r="2.5" fill="#a5f3fc" opacity="0.5"/>
  <circle cx="420" cy="650" r="2" fill="#6ee7b7" opacity="0.5"/>
