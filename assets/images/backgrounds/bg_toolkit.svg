<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主背景渐变 - 青绿科技感 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="50%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
    <!-- 光晕 -->
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="25%" r="42%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="80%" r="38%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <!-- 浮球渐变 -->
    <radialGradient id="orb1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </radialGradient>
    <radialGradient id="orb2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.06"/>
    </radialGradient>
    <radialGradient id="orb3" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3d1" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#glow1)"/>
  <rect width="1024" height="1024" fill="url(#glow2)"/>
  <rect width="1024" height="1024" fill="url(#glow3)"/>
  <!-- 浮动球体 -->
  <ellipse cx="180" cy="220" rx="95" ry="95" fill="url(#orb1)"/>
  <ellipse cx="820" cy="150" rx="75" ry="75" fill="url(#orb2)"/>
  <ellipse cx="700" cy="780" rx="115" ry="115" fill="url(#orb1)"/>
  <ellipse cx="250" cy="750" rx="65" ry="65" fill="url(#orb3)"/>
  <ellipse cx="480" cy="480" rx="45" ry="45" fill="url(#orb2)"/>
  <ellipse cx="580" cy="200" rx="55" ry="55" fill="url(#orb3)"/>
  <ellipse cx="100" cy="580" rx="50" ry="50" fill="url(#orb2)"/>
  <!-- 星光点 -->
  <circle cx="350" cy="320" r="2" fill="#67e8f9" opacity="0.55"/>
  <circle cx="750" cy="420" r="2.5" fill="#a5f3fc" opacity="0.5"/>
  <circle cx="420" cy="650" r="2" fill="#6ee7b7" opacity="0.5"/>
  <circle cx="150" cy="450" r="1.5" fill="#67e8f9" opacity="0.4"/>
  <circle cx="880" cy="550" r="2" fill="#a5f3fc" opacity="0.45"/>
  <circle cx="600" cy="850" r="1.5" fill="#6ee7b7" opacity="0.4"/>
  <circle cx="300" cy="880" r="2" fill="#67e8f9" opacity="0.35"/>
  <circle cx="920" cy="320" r="1.5" fill="#a5f3fc" opacity="0.4"/>
</svg>
