    </radialGradient>
    <radialGradient id="default_toolkit_glow3" cx="55%" cy="80%" r="38%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <!-- 娴悆娓愬彉 -->
    <radialGradient id="default_toolkit_orb1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
