  <rect width="1024" height="1024" fill="url(#default_toolkit_bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#default_toolkit_glow1)"/>
  <rect width="1024" height="1024" fill="url(#default_toolkit_glow2)"/>
  <rect width="1024" height="1024" fill="url(#default_toolkit_glow3)"/>
  <!-- 娴姩鐞冧綋 -->
  <ellipse cx="180" cy="220" rx="95" ry="95" fill="url(#default_toolkit_orb1)"/>
  <ellipse cx="820" cy="150" rx="75" ry="75" fill="url(#default_toolkit_orb2)"/>
  <ellipse cx="700" cy="780" rx="115" ry="115" fill="url(#default_toolkit_orb1)"/>
  <ellipse cx="250" cy="750" rx="65" ry="65" fill="url(#default_toolkit_orb3)"/>
