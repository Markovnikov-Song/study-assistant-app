version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: studyapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyuser
      POSTGRES_PASSWORD: studypass
      POSTGRES_DB: studydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyuser -d studydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: studyapp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://studyuser:studypass@db:5432/studydb
    ports:
      - "8000:8000"

volumes:
  pgdata:
